name: 'AzureCreateRootCert: Integration Tests'

permissions:
  checks: write
  contents: read
  id-token: write  # Required for workload identity (OIDC) tests

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: windows-2025-vs2026
    environment: Test

    env:
      AzureCertToolsPath: ${{ github.workspace }}\src\AzureCertTools
      AzureCertToolsSolutionPath: ${{ github.workspace }}\src\AzureCertTools\AzureCertTools.slnx

      # Key Vault URLs for integration tests
      AZURE_KEYVAULT_URL_STANDARD: ${{ vars.TEST_AZURE_KEYVAULT_URL_STANDARD }}
      AZURE_KEYVAULT_URL_PREMIUM: ${{ vars.TEST_AZURE_KEYVAULT_URL_PREMIUM }}
      
      # Client ID and Tenant ID for both ClientSecret and WorkloadIdentity
      AZURE_CLIENT_ID: ${{ secrets.TEST_AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.TEST_AZURE_TENANT_ID }}
      
      # Client secret for ClientSecret-based authentication tests
      AZURE_CLIENT_SECRET: ${{ secrets.TEST_AZURE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x' # Use the latest .NET 10 SDK

      - name: 'Build: Restore'
        run: dotnet restore ${{ env.AzureCertToolsSolutionPath }}
        shell: pwsh

      - name: 'Build: AzureCertTools'
        run: dotnet build ${{ env.AzureCertToolsSolutionPath }} --configuration Release --no-restore
        shell: pwsh

      - name: 'Test: Azure CLI login'
        uses: azure/login@v3
        with:
          allow-no-subscriptions: true
          client-id: ${{ secrets.TEST_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TEST_AZURE_TENANT_ID }}        

      - name: 'Test: Write OIDC token file for WorkloadIdentityCredential'
        run: |
          # Fetch the GitHub Actions OIDC JWT and write it to a temp file so that
          # Azure.Identity's WorkloadIdentityCredential can find it via AZURE_FEDERATED_TOKEN_FILE.
          # azure/login only configures the Azure CLI; it does not expose the raw OIDC token file.
          $tokenResponse = Invoke-RestMethod `
            -Uri "$env:ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" `
            -Headers @{ Authorization = "bearer $env:ACTIONS_ID_TOKEN_REQUEST_TOKEN" }
          $tokenFile = [System.IO.Path]::Combine(
            $env:RUNNER_TEMP,
            "oidc_token_$([System.Guid]::NewGuid().ToString('N')).txt"
          )
          Set-Content -Path $tokenFile -Value $tokenResponse.value -NoNewline
          "AZURE_FEDERATED_TOKEN_FILE=$tokenFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: 'Test: Validate environment'
        run: |
          $requiredVariables = @(
            'AZURE_KEYVAULT_URL_STANDARD',
            'AZURE_KEYVAULT_URL_PREMIUM',
            'AZURE_CLIENT_ID',
            'AZURE_TENANT_ID',
            'AZURE_CLIENT_SECRET',
            'AZURE_FEDERATED_TOKEN_FILE'
          )

          $missingVariables = $requiredVariables |
            Where-Object { [string]::IsNullOrWhiteSpace((Get-Item -Path "env:$_" -ErrorAction SilentlyContinue).Value) }

          if ($missingVariables.Count -gt 0) {
            throw "Missing required environment variables: $($missingVariables -join ', '). Verify the corresponding GitHub Actions secrets are defined for the Test environment."
          }

      - name: 'Test: Run Tests'
        run: |
          $testProjects = Get-ChildItem -Path "${{ env.AzureCertToolsPath }}" -Filter *.csproj -Recurse |
            Where-Object { $_.Directory.Name -eq 'tests' }

          if ($testProjects.Count -eq 0) {
            throw "No test projects found under ${{ env.AzureCertToolsPath }} in folders named 'tests'."
          }

          foreach ($testProject in $testProjects) {
            dotnet test $testProject.FullName `
              --configuration Release `
              --no-build `
              --logger "trx;LogFileName=$($testProject.BaseName).trx" `
              --results-directory "${{ github.workspace }}\TestResults"
          }
        shell: pwsh

      - name: 'Test: Report Results'
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Integration Test Results
          path: ${{ github.workspace }}\TestResults\*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: 'Test: Publish Test Results'
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ${{ github.workspace }}\TestResults\*.trx
